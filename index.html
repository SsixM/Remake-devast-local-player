<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival IO - Sketch Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #faf5e6; font-family: 'Comic Neue', cursive; user-select: none; }
        canvas { display: block; }
        
        .sketch-text {
            color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР HUD --- */
        #hud-main-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: flex-end; gap: 40px; z-index: 5;
            width: max-content;
        }

        /* --- БЛОК ХАРАКТЕРИСТИК И ВРЕМЕНИ (СЛЕВА) --- */
        #stats-and-time-wrapper {
            display: flex; align-items: stretch; gap: 15px;
            height: 170px; /* ЖЕСТКАЯ ВЫСОТА ДЛЯ ОБЕИХ ПАНЕЛЕЙ */
            flex-shrink: 0;
        }

        /* Панель времени суток (Гаусс) */
        #light-gauge-panel {
            width: 300px;
            padding: 20px;
            background: url('./img/hudstat.png') center/100% 100% no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-sizing: border-box;
        }
        
        #lg-title { font-size: 18px; margin-bottom: auto; }
        
        #lg-content {
            display: flex; width: 100%; justify-content: center; align-items: flex-end; gap: 10px;
        }
        
        .time-icon { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; }
        
        #time-arc-container {
            width: 160px; height: 80px; border: 3px solid #000;
            border-radius: 80px 80px 0 0; position: relative; overflow: hidden;
            background: linear-gradient(90deg, #fffaaa 50%, #88aaff 50%); 
            flex-shrink: 0;
        }
        
        #time-needle {
            position: absolute; bottom: 0; left: 50%; width: 16px; height: 75px;
            background: url('./img/gaugevector.png') center/contain no-repeat;
            transform-origin: bottom center; transform: translateX(-50%) rotate(0deg);
            z-index: 2; transition: transform 0.2s linear;
        }

        /* Панель статов */
        #stats-panel {
            width: 420px;
            padding: 25px;
            background: url('./img/hudstat.png') center/100% 100% no-repeat;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box;
        }

        .stat-bar-row {
            display: flex; align-items: center; gap: 15px; width: 100%; height: 30px;
        }
        
        .stat-label { width: 90px; font-size: 18px; text-align: right; }
        
        .stat-bar-outer {
            flex-grow: 1; height: 100%; border: 3px solid #000;
            position: relative; background: #fff; overflow: hidden;
        }
        
        .stat-bar-fill {
            height: 100%; width: 100%;
            transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #fill-hp { background-color: #77dd77; } 
        #fill-water { background-color: #77aaff; } 
        #fill-stamina { background-color: #ffbb55; } 
        
        .stat-value-text {
            position: absolute; top: 0; left: 0; width: 100%; text-align: center;
            font-size: 18px; line-height: 30px; color: #000; z-index: 1;
        }

        /* --- БЛОК ИНВЕНТАРЯ И КРАФТА (СПРАВА) --- */
        #inventory-and-craft-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            gap: 15px; /* Отступ между рюкзаком и инвентарем */
        }

        /* Кнопка крафта (Рюкзак) */
        #craft-btn {
            width: 90px; height: 90px; cursor: pointer; border: none; outline: none;
            background: url('./img/craft.png') center/contain no-repeat; background-color: transparent; 
            transition: transform 0.1s; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        #craft-btn:hover { transform: scale(1.05); filter: drop-shadow(0 7px 8px rgba(0,0,0,0.4)); }
        #craft-btn:active { transform: scale(0.95); }

        /* Контейнер инвентаря - СЕТКА 2x3 */
        #inventory-ui {
            display: grid; 
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 8px; padding: 12px;
            background: rgba(250, 245, 230, 0.85); /* Легкая бумажная подложка */
            border: 3px solid #000; border-radius: 12px;
        }

        .slot {
            width: 100%; height: 100%; position: relative; cursor: pointer;
            background: url('./img/slot.png') center/contain no-repeat;
            transition: transform 0.15s, filter 0.15s;
        }
        
        .slot.selected { 
            transform: translateY(-5px); 
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.7)) brightness(1.1); 
        }
        
        .slot img { width: 60%; height: 60%; margin: 20%; object-fit: contain; pointer-events: none; }
        
        .slot-count {
            position: absolute; bottom: 4px; right: 8px; color: #000;
            font-size: 16px; font-weight: 700; pointer-events: none;
        }

        /* --- МОДАЛЬНОЕ ОКНО КРАФТА --- */
        #craft-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 650px; height: 500px;
            background: url('./img/hudstat.png') center/100% 100% no-repeat; background-color: #faf5e6; 
            padding: 35px; border-radius: 20px;
            flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 10;
        }
        
        .craft-nav { display: flex; gap: 12px; margin-bottom: 25px; border-bottom: 3px solid #000; padding-bottom: 15px; }
        .craft-tab { background: #fff; border: 2px solid #000; color: #000; padding: 10px 20px; cursor: pointer; border-radius: 8px; font-family: 'Comic Neue', cursive; font-size: 16px; transition: 0.2s; }
        .craft-tab.active { background: #fffaaa; border-color: #ffd700; color: #000; }
        
        .craft-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 10px; }
        .craft-list::-webkit-scrollbar { width: 6px; }
        .craft-list::-webkit-scrollbar-thumb { background: #000; border-radius: 3px; }
        
        .craft-item { background: #fff; padding: 18px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; border: 2px solid #000; }
        
        .craft-do { font-family: 'Comic Neue', cursive; font-size: 16px; background: url('./img/craft.png') center/contain no-repeat; background-color: transparent; border: none; color: #000; width: 110px; height: 45px; cursor: pointer; transition: 0.2s; }
        .craft-do[disabled] { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; }
        
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: 3px solid #000; color: #000; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; }

        /* Полоса прогресса действий */
        #action-bar-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, 130px);
            width: 220px; height: 10px; background: #fff; border-radius: 5px; border: 2px solid #000;
            display: none; overflow: hidden;
        }
        #action-fill { height: 100%; background: #000; width: 0%; }
        #action-text { position: absolute; top: -25px; left: 0; width: 100%; text-align: center; color: #000; font-size: 16px; }

    </style>
</head>
<body>
    <div id="action-bar-container">
        <div id="action-text" class="sketch-text"></div>
        <div id="action-fill"></div>
    </div>

    <div id="craft-modal">
        <button class="close-modal" id="close-craft">X</button>
        <div class="craft-nav" id="craft-nav"></div>
        <div class="craft-list" id="craft-list"></div>
    </div>

    <div id="hud-main-container">
        
        <div id="stats-and-time-wrapper">
            
            <div id="light-gauge-panel">
                <div id="lg-title" class="sketch-text">LIGHT GAUGE</div>
                <div id="lg-content">
                    <img src="./img/gauge.png" alt="Day" class="time-icon"> 
                    <div id="time-arc-container">
                        <div id="time-needle"></div> 
                    </div>
                    <img src="./img/gauge.png" alt="Night" class="time-icon" style="filter: invert(1);"> 
                </div>
            </div>

            <div id="stats-panel">
                <div class="stat-bar-row">
                    <div class="stat-label sketch-text">HP</div>
                    <div class="stat-bar-outer">
                        <div class="stat-bar-fill" id="fill-hp"></div>
                        <div class="stat-value-text" id="text-hp">100 / 100</div>
                    </div>
                </div>
                <div class="stat-bar-row">
                    <div class="stat-label sketch-text">WATER</div>
                    <div class="stat-bar-outer">
                        <div class="stat-bar-fill" id="fill-water"></div>
                        <div class="stat-value-text" id="text-water">100 / 100</div>
                    </div>
                </div>
                <div class="stat-bar-row">
                    <div class="stat-label sketch-text">STAMINA</div>
                    <div class="stat-bar-outer">
                        <div class="stat-bar-fill" id="fill-stamina"></div>
                        <div class="stat-value-text" id="text-stamina">100 / 100</div>
                    </div>
                </div>
            </div>

        </div>

        <div id="inventory-and-craft-wrapper">
            
            <button id="craft-btn"></button>

            <div id="inventory-ui">
                <div class="slot" data-index="0"><img src="" id="img-0"><span class="slot-count" id="cnt-0"></span></div>
                <div class="slot" data-index="1"><img src="" id="img-1"><span class="slot-count" id="cnt-1"></span></div>
                <div class="slot" data-index="2"><img src="" id="img-2"><span class="slot-count" id="cnt-2"></span></div>
                <div class="slot" data-index="3"><img src="" id="img-3"><span class="slot-count" id="cnt-3"></span></div>
                <div class="slot" data-index="4"><img src="" id="img-4"><span class="slot-count" id="cnt-4"></span></div>
                <div class="slot" data-index="5"><img src="" id="img-5"><span class="slot-count" id="cnt-5"></span></div>
            </div>
            
        </div>
        
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module" src="./main.js"></script>
</body>
</html>
