name: Deploy Obfuscated Game to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем чистый код из репозитория
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js 24 (исправлен параметр и версия на 2026 год)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. Устанавливаем зависимости
      - name: Install Dependencies
        run: npm install

      # 4. Запускаем сборку и обфускацию
      - name: Build and Obfuscate Project
        run: npm run build

      # 5. Публикуем зашифрованную папку dist на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist