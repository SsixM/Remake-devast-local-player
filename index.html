<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival IO - Canvas UI Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Neucha&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #faf5e6; user-select: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="./main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker запущен!', reg.scope))
                    .catch(err => console.error('Ошибка регистрации воркера:', err));
            });
        }
    </script>
</body>
</html>
